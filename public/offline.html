<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | Stocky POS</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f1f5f9; color: #1f2937; }
    .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 440px; width: 100%; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.06); padding: 28px; text-align: center; }
    .logo { width: 72px; height: 72px; margin: 0 auto 12px; display: block; }
    h1 { font-size: 1.25rem; margin: 8px 0 4px; }
    p { margin: 6px 0; color: #475569; font-size: .95rem; line-height: 1.45; }
    .status { display: inline-block; margin-top: 12px; padding: 6px 12px; border-radius: 999px; font-size: .8rem; font-weight: 600; }
    .offline { background: #fef3c7; color: #92400e; }
    .online { background: #dcfce7; color: #166534; }
    button { margin-top: 18px; padding: 10px 18px; font-size: .95rem; border: 0; border-radius: 8px; background: #2f3640; color: #fff; cursor: pointer; }
    button:hover { background: #1f2937; }
    .hint { margin-top: 14px; font-size: .8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img src="/pwa_images/pwa-icon-192.png" alt="Stocky" class="logo" onerror="this.style.display='none'">
      <h1>You're offline</h1>
      <p>The POS app shell isn't cached on this device yet.</p>
      <p>Queued sales (if any) are safely stored and will sync automatically once the connection returns.</p>
      <span id="netStatus" class="status offline">Offline</span>
      <div>
        <button onclick="location.reload()">Try again</button>
      </div>
      <p class="hint">Tip: open the POS at least once online so the app shell is cached for future offline use.</p>
    </div>
  </div>
  <script>
    (function () {
      var el = document.getElementById('netStatus');
      function update() {
        if (navigator.onLine) {
          el.className = 'status online';
          el.textContent = 'Online';
        } else {
          el.className = 'status offline';
          el.textContent = 'Offline';
        }
      }
      update();
      window.addEventListener('online', update);
      window.addEventListener('offline', update);
    })();
  </script>
</body>
</html>
